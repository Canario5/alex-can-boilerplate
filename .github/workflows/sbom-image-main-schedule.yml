name: SBOM (Image) - main + weekly

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # Monday 04:00

jobs:
  build:
    uses: ./.github/workflows/build-image.yml
    permissions: #* nested workflows cannot escalate permissions
      packages: write     #? needed for build-image.yml
      contents: read      #? needed for build-image.yml

  sbom-image:
    needs: build
    name: Image SBOM (main + weekly)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: read
    env:
      TRIVY_QUIET: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ${{ needs.build.outputs.image-tag }}

      - name: Image SBOM -> GitHub Dependency Graph
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'image'
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: 'github'
          output: 'image-dependency-results.sbom.json'
          github-pat: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 15

      - name: Image SBOM (CycloneDX) artifact
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'image'
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: 'cyclonedx'
          output: 'image-sbom.cyclonedx.json'
        timeout-minutes: 15

      - name: Upload Image SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-image-${{ github.run_number }}-${{ github.sha }}
          path: |
            image-dependency-results.sbom.json
            image-sbom.cyclonedx.json
          retention-days: 30
