name: Trivy Security Scan - Image

on:
  workflow_call:
    inputs:
      image-tag:
        type: string
        required: true
        description: "Pre-built image tag to scan"

jobs:
  image-scan:
    name: Image (OS + app libraries CVEs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ${{ inputs.image-tag }}

      - name: Run Trivy image scan
        id: trivy_image
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'image'
          image-ref: ${{ inputs.image-tag }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          limit-severities-for-sarif: true
          trivyignores: '.trivyignore'

      - name: Fail if Trivy found CRITICAL/HIGH
        if: steps.trivy_image.outcome == 'failure'
        run: |
          echo "Trivy reported CRITICAL/HIGH findings."
          exit 1

      - name: Upload Image results to GitHub Security tab
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: trivy-image-scan
