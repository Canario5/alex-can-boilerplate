name: SBOM (FS) - PR deps only
on:
  pull_request:
    branches: [main]
    paths:
      - '**/pnpm-lock.yaml'
      - '**/package.json'

jobs:
  sbom-fs-pr:
    name: Filesystem SBOM on PR (when package.json or pnpm-lock.yaml changes)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TRIVY_QUIET: "true"
      TRIVY_INCLUDE_DEV_DEPS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: FS SBOM -> GitHub Dependency Graph
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'github'
          output: 'dependency-results.sbom.json'
          github-pat: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 10

      - name: FS SBOM (CycloneDX) artifact
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom.cyclonedx.json'
        timeout-minutes: 10

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-fs-pr
          path: |
            dependency-results.sbom.json
            sbom.cyclonedx.json
          retention-days: 14
