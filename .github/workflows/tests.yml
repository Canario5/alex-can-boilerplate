name: Test Pipeline

on:
  workflow_call:
    inputs:
      run-unit:
        type: boolean
        default: true
      run-component:
        type: boolean
        default: true
      run-integration:
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      run-unit:
        description: 'Run unit tests?'
        type: boolean
        default: true
      run-component:
        description: 'Run component tests?'
        type: boolean
        default: true
      run-integration:
        description: 'Run integration tests?'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    if: inputs.run-unit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write  #? For node caching
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm (uses "packageManager" from package.json)
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit tests
        run: pnpm run test:unit:coverage

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./reports/coverage
          flags: unit
          name: unit-coverage
          fail_ci_if_error: false

      - name: Upload unit test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./reports/vitest/junit.xml
          flags: unit
          name: unit-tests
          report_type: test_results
          fail_ci_if_error: false

  component:
    if: inputs.run-component
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write  #? For node caching
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm (uses "packageManager" from package.json)
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright #? Where Ubuntu runner stores downloaded browsers
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }} #? Name of this cache "os-playwright-<hash of the pnpm-lock.yaml>"
          restore-keys: ${{ runner.os }}-playwright- #? Playwright is smart and can use incremental updates with older cache

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Component tests
        run: pnpm run test:component:coverage

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./reports/coverage
          flags: component
          name: component-coverage
          fail_ci_if_error: false

      - name: Upload component test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./reports/vitest/junit.xml
          flags: component
          name: component-tests
          report_type: test_results
          fail_ci_if_error: false

  integration:
    if: inputs.run-integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write  #? For node caching
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm (uses "packageManager" from package.json)
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright #? Where Ubuntu runner stores downloaded browsers
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }} #? Name of this cache "os-playwright-<hash of the pnpm-lock.yaml>"
          restore-keys: ${{ runner.os }}-playwright- #? Playwright is smart and can use incremental updates with older cache

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Integration tests
        run: pnpm run test:integration:coverage

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./reports/coverage
          flags: integration
          name: integration-coverage
          fail_ci_if_error: false

      - name: Upload integration test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./reports/vitest/junit.xml
          flags: integration
          name: integration-tests
          report_type: test_results
          fail_ci_if_error: false
